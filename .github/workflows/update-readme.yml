name: 🔄 Refresh GitHub Profile README

# ─────────────────────────────────────────────
#  Triggers:
#   • Cron: every 12 hours
#   • Manual trigger from the Actions UI
#   • Push to main (to validate the workflow itself)
# ─────────────────────────────────────────────
on:
  schedule:
    - cron: "0 */12 * * *"   # Every 12 hours (00:00 & 12:00 UTC)
  workflow_dispatch:          # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - "README.md"
      - ".github/workflows/update-readme.yml"

permissions:
  contents: write   # Needed to commit the refreshed README back

# ─────────────────────────────────────────────
#  Shared configuration for both GitHub accounts
# ─────────────────────────────────────────────
env:
  ACTIVITY_GRAPH_BASE: "https://github-readme-activity-graph.vercel.app/graph"
  # Primary account (shivansh-mishraji)
  PRIMARY_USER: "shivansh-mishraji"
  PRIMARY_COLOR: "6ee7f7"
  PRIMARY_LINE: "6366f1"
  PRIMARY_POINT: "6ee7f7"
  PRIMARY_TITLE: "shivansh-mishraji%27s%20Contribution%20Graph"
  # Secondary account (Shivanshmishra7275)
  SECONDARY_USER: "Shivanshmishra7275"
  SECONDARY_COLOR: "a78bfa"
  SECONDARY_LINE: "ec4899"
  SECONDARY_POINT: "a78bfa"
  SECONDARY_TITLE: "Shivanshmishra7275%27s%20Contribution%20Graph"
  # Shared graph settings
  GRAPH_BG: "0d1117"

jobs:
  # ────────────────────────────────────────────
  #  Job 1: Validate README structure
  # ────────────────────────────────────────────
  validate-readme:
    name: ✅ Validate README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check README exists and is non-empty
        run: |
          if [ ! -f README.md ]; then
            echo "ERROR: README.md not found!"
            exit 1
          fi

          LINE_COUNT=$(wc -l < README.md)
          echo "README.md line count: $LINE_COUNT"

          if [ "$LINE_COUNT" -lt 10 ]; then
            echo "ERROR: README.md appears too short (< 10 lines). Something may be wrong."
            exit 1
          fi

          echo "README.md validation passed."

  # ────────────────────────────────────────────
  #  Job 2: Refresh dynamic badge timestamps
  #          and commit an update marker
  # ────────────────────────────────────────────
  refresh-readme:
    name: 🚀 Refresh Profile README
    runs-on: ubuntu-latest
    needs: validate-readme

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a token with write access so we can push back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git identity
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # ── Step: Touch the README to refresh GitHub's CDN cache ──────────
      # GitHub caches external badge images. By making a minor, invisible
      # change (updating a hidden comment timestamp), we bust that cache so
      # stats cards, streak cards, and activity graphs always show the
      # latest data when the profile is visited.
      - name: Update last-refreshed timestamp in README
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "Updating README with timestamp: $TIMESTAMP"

          # Replace the timestamp comment line (or insert one if missing)
          if grep -q "<!-- LAST_REFRESHED:" README.md; then
            sed -i "s|<!-- LAST_REFRESHED:.*-->|<!-- LAST_REFRESHED: $TIMESTAMP -->|g" README.md
          else
            # Append as the very last line
            echo "" >> README.md
            echo "<!-- LAST_REFRESHED: $TIMESTAMP -->" >> README.md
          fi

      # ── Step: Fetch latest GitHub activity SVG snapshots ──────────────
      # We pull both accounts' contribution graphs as raw SVGs and embed
      # them as cached assets so the profile loads fast even if external
      # services are slow.
      - name: Cache activity graph snapshots (primary account)
        run: |
          mkdir -p .github/assets

          # Primary account activity graph
          curl -sL \
            "${ACTIVITY_GRAPH_BASE}?username=${PRIMARY_USER}&custom_title=${PRIMARY_TITLE}&bg_color=${GRAPH_BG}&color=${PRIMARY_COLOR}&line=${PRIMARY_LINE}&point=${PRIMARY_POINT}&area=true&hide_border=true" \
            -o .github/assets/activity-primary.svg || echo "Warning: Could not fetch primary activity graph SVG (non-fatal)"

          # Secondary account activity graph
          curl -sL \
            "${ACTIVITY_GRAPH_BASE}?username=${SECONDARY_USER}&custom_title=${SECONDARY_TITLE}&bg_color=${GRAPH_BG}&color=${SECONDARY_COLOR}&line=${SECONDARY_LINE}&point=${SECONDARY_POINT}&area=true&hide_border=true" \
            -o .github/assets/activity-secondary.svg || echo "Warning: Could not fetch secondary activity graph SVG (non-fatal)"

          echo "Activity graph SVG cache refresh attempted."

      # ── Step: Commit and push if anything changed ─────────────────────
      - name: Commit refreshed README and assets
        run: |
          git add README.md .github/assets/ 2>/dev/null || true

          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No changes to commit — README is already up to date."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore(readme): auto-refresh profile stats [$TIMESTAMP]"
            git push origin HEAD
            echo "README refreshed and pushed successfully."
          fi

  # ────────────────────────────────────────────
  #  Job 3: Notify on failure (optional guard)
  # ────────────────────────────────────────────
  notify-on-failure:
    name: 📣 Failure Notification
    runs-on: ubuntu-latest
    needs: [validate-readme, refresh-readme]
    if: failure()
    steps:
      - name: Print failure summary
        run: |
          echo "One or more jobs in the README refresh workflow failed."
          echo "Check the Actions log above for details."
          echo "Common causes:"
          echo "  • External badge service (shields.io, vercel) is temporarily down"
          echo "  • GITHUB_TOKEN permissions are insufficient (needs contents: write)"
          echo "  • README.md was accidentally deleted or corrupted"
